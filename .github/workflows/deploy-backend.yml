name: Deploy Backend

on:
  repository_dispatch:
    types: [deploy-backend]
  workflow_dispatch:
    inputs:
      destroy_before_deploy:
        description: "Run 'cdk destroy' before deploy"
        required: false
        default: false
        type: boolean
      force_migration_run:
        description: "Force RunMigrations custom resource"
        required: false
        default: false
        type: boolean
      run_seed_data:
        description: "Run seed data after migrations (backend stack only)"
        required: false
        default: false
        type: boolean
      cdk_stacks:
        description: "CDK stacks to deploy"
        required: false
        default: "all stacks"
        type: choice
        options:
          - "all stacks"
          - "lambda apis"
          - "admin web"
          - "public website"
          - "waf (us-east-1)"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "packages/models_shared/**"
      - "scripts/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Determine deployment region
        id: region
        env:
          INPUT_CDK_STACKS: ${{ github.event.inputs.cdk_stacks || vars.CDK_STACKS || 'all stacks' }}
          INPUT_AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if [ "$INPUT_CDK_STACKS" = "waf (us-east-1)" ]; then
            echo "region=us-east-1" >> "$GITHUB_OUTPUT"
          else
            echo "region=$INPUT_AWS_REGION" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ steps.region.outputs.region }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Install CDK dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: Bootstrap CDK
        working-directory: backend/infrastructure
        run: |
          npx cdk acknowledge 34892 || true
          if [ -n "$CDK_BOOTSTRAP_QUALIFIER" ]; then
            npx cdk bootstrap --no-notices --qualifier "$CDK_BOOTSTRAP_QUALIFIER" "aws://$AWS_ACCOUNT_ID/$AWS_REGION"
          else
            npx cdk bootstrap --no-notices "aws://$AWS_ACCOUNT_ID/$AWS_REGION"
          fi
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ steps.region.outputs.region }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}

      - name: Deploy stacks
        working-directory: backend/infrastructure
        run: |
          npx cdk acknowledge 34892 || true
          npm run build --if-present

          if [ "${CDK_STACKS:-}" = "all stacks" ]; then
            CDK_STACKS="lxsoftware-siutindei lxsoftware-siutindei-admin-web lxsoftware-siutindei-public-www"
          elif [ "${CDK_STACKS:-}" = "lambda apis" ]; then
            CDK_STACKS="lxsoftware-siutindei"
          elif [ "${CDK_STACKS:-}" = "admin web" ]; then
            CDK_STACKS="lxsoftware-siutindei-admin-web"
          elif [ "${CDK_STACKS:-}" = "public website" ] || \
            [ "${CDK_STACKS:-}" = "public www" ] || \
            [ "${CDK_STACKS:-}" = "public website staging" ] || \
            [ "${CDK_STACKS:-}" = "public www staging" ]; then
            CDK_STACKS="lxsoftware-siutindei-public-www"
          elif [ "${CDK_STACKS:-}" = "waf (us-east-1)" ]; then
            CDK_STACKS="lxsoftware-siutindei-waf"
          fi

          PARAM_ARGS=()

          resolve_param_file() {
            local path="$1"
            if [ -z "$path" ]; then
              return 1
            fi
            if [ -f "$path" ]; then
              echo "$path"
              return 0
            fi
            if [ -n "$GITHUB_WORKSPACE" ] && [ -f "$GITHUB_WORKSPACE/$path" ]; then
              echo "$GITHUB_WORKSPACE/$path"
              return 0
            fi
            return 1
          }

          if [ -n "${CDK_PARAM_FILE:-}" ]; then
            RESOLVED_PARAM_FILE=$(resolve_param_file "$CDK_PARAM_FILE" || true)
            if [ -z "$RESOLVED_PARAM_FILE" ]; then
              echo "CDK_PARAM_FILE '$CDK_PARAM_FILE' not found"
              exit 1
            fi
            PARAM_ARGS_FILE="$(mktemp)"
            PARAM_FILE="$RESOLVED_PARAM_FILE" STACKS="$CDK_STACKS" python3 - <<'PY' > "$PARAM_ARGS_FILE"
          import json
          import os
          import sys

          with open(os.environ["PARAM_FILE"], "r", encoding="utf-8") as handle:
              params = json.load(handle)

          stack_set = set(os.environ.get("STACKS", "").split())
          api_stack = "lxsoftware-siutindei"
          admin_web_stack = "lxsoftware-siutindei-admin-web"
          public_stack = "lxsoftware-siutindei-public-www"
          admin_web_params = {"AdminWebDomainName", "AdminWebCertificateArn", "WafWebAclArn"}
          public_params = {
              "PublicWwwDomainName",
              "PublicWwwCertificateArn",
              "PublicWwwStagingDomainName",
              "PublicWwwStagingCertificateArn",
              "WafWebAclArn",
          }

          def resolve_value(raw: str) -> str:
              """Replace <FROM_GITHUB_SECRET: X> / <FROM_GITHUB_VAR: X> placeholders."""
              raw = raw.strip()
              if raw.startswith("<FROM_GITHUB_SECRET:") and raw.endswith(">"):
                  env_name = raw[len("<FROM_GITHUB_SECRET:") : -1].strip()
                  return os.environ.get(env_name, "")
              if raw.startswith("<FROM_GITHUB_VAR:") and raw.endswith(">"):
                  env_name = raw[len("<FROM_GITHUB_VAR:") : -1].strip()
                  return os.environ.get(env_name, "")
              return raw

          for key, value in params.items():
              value_str = ""
              if value is not None:
                  value_str = resolve_value(str(value))
              value_str = value_str.replace("\r\n", "\n").replace("\r", "\n")
              value_str = value_str.replace("\n", "\\n").strip()
              if key != "WafWebAclArn" and not value_str:
                  continue

              targets = []
              if key in admin_web_params:
                  if value_str or key != "WafWebAclArn":
                      targets.append(admin_web_stack)
              if key in public_params:
                  targets.append(public_stack)
              if not targets:
                  targets.append(api_stack)

              for target in targets:
                  if target not in stack_set:
                      continue
                  sys.stdout.buffer.write(b"--parameters\0")
                  sys.stdout.buffer.write(
                      f"{target}:{key}={value_str}".encode("utf-8") + b"\0"
                  )
          PY
            mapfile -d '' -t PARAM_ARGS < "$PARAM_ARGS_FILE"
          fi

          RUN_SEED_DATA_NORMALIZED="$(printf '%s' "${RUN_SEED_DATA:-false}" | tr '[:upper:]' '[:lower:]')"
          if [ "$RUN_SEED_DATA_NORMALIZED" = "true" ]; then
            if [[ " $CDK_STACKS " == *" lxsoftware-siutindei "* ]]; then
              FILTERED_PARAM_ARGS=()
              for arg in "${PARAM_ARGS[@]}"; do
                if [[ "$arg" == "lxsoftware-siutindei:RunSeedData="* ]]; then
                  continue
                fi
                FILTERED_PARAM_ARGS+=("$arg")
              done
              PARAM_ARGS=("${FILTERED_PARAM_ARGS[@]}")
              PARAM_ARGS+=("--parameters" "lxsoftware-siutindei:RunSeedData=true")
              echo "RunSeedData override enabled for lxsoftware-siutindei stack."
            else
              echo "run_seed_data=true requested, but API stack is not selected; skipping seed override."
            fi
          fi

          QUALIFIER_ARGS=()
          if [ -n "$CDK_BOOTSTRAP_QUALIFIER" ]; then
            QUALIFIER_ARGS=(--qualifier "$CDK_BOOTSTRAP_QUALIFIER")
          fi

          IFS=$', \n\t' read -r -a STACK_LIST <<< "$CDK_STACKS"

          if [ "${DESTROY_BEFORE_DEPLOY:-false}" = "true" ]; then
            if [ ${#STACK_LIST[@]} -gt 0 ]; then
              npx cdk destroy --no-notices --force "${QUALIFIER_ARGS[@]}" "${STACK_LIST[@]}"
            else
              npx cdk destroy --no-notices --force "${QUALIFIER_ARGS[@]}" lxsoftware-siutindei
            fi
          fi

          MANAGED_STACKS=(
            lxsoftware-siutindei
            lxsoftware-siutindei-admin-web
            lxsoftware-siutindei-public-www
            lxsoftware-siutindei-waf
          )

          continue_rollback_for_wedged_stacks() {
            for managed in "${MANAGED_STACKS[@]}"; do
              if [[ ! " $CDK_STACKS " == *" $managed "* ]]; then
                continue
              fi
              local status
              status="$(aws cloudformation describe-stacks \
                --stack-name "$managed" \
                --region "$AWS_REGION" \
                --query 'Stacks[0].StackStatus' \
                --output text 2>/dev/null || echo MISSING)"
              if [ "$status" != "UPDATE_ROLLBACK_FAILED" ]; then
                continue
              fi
              echo "Stack ${managed} is in UPDATE_ROLLBACK_FAILED; calling continue-update-rollback."
              if ! aws cloudformation continue-update-rollback \
                --stack-name "$managed" \
                --region "$AWS_REGION"; then
                echo "continue-update-rollback failed for ${managed}; the next deploy attempt will report the wedged state."
                continue
              fi
              echo "Waiting for ${managed} to reach UPDATE_ROLLBACK_COMPLETE (timeout ~15m)."
              if ! aws cloudformation wait stack-rollback-complete \
                --stack-name "$managed" \
                --region "$AWS_REGION"; then
                echo "Wait for stack-rollback-complete on ${managed} timed out or failed."
              fi
            done
          }

          MAX_CDK_DEPLOY_ATTEMPTS=3
          attempt=1
          deploy_exit=1
          while [ "$attempt" -le "$MAX_CDK_DEPLOY_ATTEMPTS" ]; do
            echo "CDK deploy attempt ${attempt} of ${MAX_CDK_DEPLOY_ATTEMPTS}"
            ATTEMPT_LOG="$(mktemp)"
            npx cdk deploy --no-notices --require-approval never \
              "${QUALIFIER_ARGS[@]}" "${PARAM_ARGS[@]}" "${STACK_LIST[@]}" 2>&1 | tee "$ATTEMPT_LOG"
            deploy_exit=${PIPESTATUS[0]}
            if [ "$deploy_exit" -eq 0 ]; then
              rm -f "$ATTEMPT_LOG"
              exit 0
            fi

            if grep -Eiq 'HandlerErrorCode: (InvalidRequest|AlreadyExists)|must be in ARN format or "\\*"|already exists\.' "$ATTEMPT_LOG"; then
              echo "Detected non-retryable CloudFormation error; failing fast without additional retries."
              rm -f "$ATTEMPT_LOG"
              exit "$deploy_exit"
            fi

            saw_rollback_failed=0
            if grep -Eiq 'is in UPDATE_ROLLBACK_FAILED state and can not be updated' "$ATTEMPT_LOG"; then
              saw_rollback_failed=1
            fi

            rm -f "$ATTEMPT_LOG"
            if [ "$attempt" -eq "$MAX_CDK_DEPLOY_ATTEMPTS" ]; then
              break
            fi

            if [ "$saw_rollback_failed" -eq 1 ]; then
              echo "Detected UPDATE_ROLLBACK_FAILED; attempting continue-update-rollback before retry."
              continue_rollback_for_wedged_stacks
            fi

            delay=$((45 * attempt))
            echo "CDK deploy failed (exit ${deploy_exit}); waiting ${delay}s before retry..."
            sleep "$delay"
            attempt=$((attempt + 1))
          done
          exit "$deploy_exit"
        env:
          AWS_REGION: ${{ steps.region.outputs.region }}
          CDK_STACKS: ${{ github.event.inputs.cdk_stacks || vars.CDK_STACKS || 'all stacks' }}
          RUN_SEED_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_seed_data || 'false' }}
          CDK_PARAM_FILE: ${{ vars.CDK_PARAM_FILE }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}
          DESTROY_BEFORE_DEPLOY: ${{ github.event.inputs.destroy_before_deploy || 'false' }}
          CDK_PARAM_GOOGLE_CLIENT_SECRET: ${{ secrets.CDK_PARAM_GOOGLE_CLIENT_SECRET }}
          CDK_PARAM_APPLE_PRIVATE_KEY: ${{ secrets.CDK_PARAM_APPLE_PRIVATE_KEY }}
          CDK_PARAM_PUBLIC_API_KEY_VALUE: ${{ secrets.CDK_PARAM_PUBLIC_API_KEY_VALUE }}
          CDK_PARAM_ADMIN_BOOTSTRAP_TEMP_PASSWORD: ${{ secrets.CDK_PARAM_ADMIN_BOOTSTRAP_TEMP_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          MIGRATIONS_FORCE_RUN_ID: >-
            ${{ github.event.inputs.force_migration_run == 'true' &&
            github.run_id || '' }}
